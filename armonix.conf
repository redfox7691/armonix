# Armonix configuration file / File di configurazione di Armonix

[armonix]
# Master keyboard connected to the system (launchkey or fantom). / Master keyboard collegata al sistema (launchkey oppure fantom).
master = launchkey

# Startup mode (true = headless service, false = Qt GUI). / Modalità di avvio (true = servizio headless, false = interfaccia Qt).
headless = true

# Enable verbose syslog messages. / Abilita log dettagliati su syslog.
verbose = false

# Disable the realtime display on the master keyboard. / Disabilita la visualizzazione sul display della master keyboard.
disable_realtime_display = false

[midi]
# Keywords used to identify MIDI ports. Leave blank to use defaults. / Parole chiave per identificare le porte MIDI; lasciare vuoto per usare i valori predefiniti.
master_port_keyword =
ketron_port_keyword = MIDI Gadget
bluetooth_port_keyword = Bluetooth

[keypad]
# Input device path for the optional USB keypad. / Percorso del dispositivo di input per il keypad USB opzionale.
device_path = /dev/input/by-id/usb-1189_USB_Composite_Device_CD70134330363235-if01-event-kbd

[vnc]
# Optional command launched when the EVM (192.168.5.1:5900) is reachable. / Comando opzionale avviato quando l'EVM (192.168.5.1:5900) è raggiungibile.
# command = /usr/bin/remmina -k --enable-fullscreen --enable-extra-hardening -c /home/b0/.local/share/remmina/group_vnc_ketron-evm_192-168-5-1.remmina
command =

# Poll interval in seconds for the reachability check. / Intervallo, in secondi, per il controllo di raggiungibilità.
poll_interval = 5

[pedals]
# ALSA port keyword to identify the MIDI pedal device (empty = disabled). / Parola chiave per identificare la porta MIDI della pedaliera (vuoto = disabilitato).
port_keyword = Arduino

[pianoteq]
# Full path to the Pianoteq executable (empty = do not autostart). / Percorso completo dell'eseguibile Pianoteq (vuoto = non avviare automaticamente).
executable =

# Extra command-line options passed to Pianoteq on launch (e.g. --headless). / Opzioni aggiuntive passate a Pianoteq all'avvio (es. --headless).
options =

# ALSA MIDI port keyword to identify Pianoteq's input port. / Parola chiave per identificare la porta ALSA di ingresso di Pianoteq.
port_keyword = Pianoteq

# Split point for pianoteq-split: notes >= this value go to Pianoteq, lower notes go to Ketron. MIDI note number (e.g. 60 = C4). / Punto di split per pianoteq-split: note >= questo valore vanno a Pianoteq, le note inferiori al Ketron. Numero di nota MIDI (es. 60 = C4).
split_note = 60

# JSON-RPC endpoint exposed by Pianoteq when started with --serve. / Endpoint JSON-RPC esposto da Pianoteq avviato con --serve.
jsonrpc_url = http://127.0.0.1:8081/jsonrpc
